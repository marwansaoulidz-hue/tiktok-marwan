services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_USER: ${MYSQL_USER:-socialapp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me_strong_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-socialapp}
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-change_me_root_password}"]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    environment:
      PMA_HOST: mysql
      PMA_USER: ${MYSQL_USER:-socialapp}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-change_me_strong_password}
    ports:
      - "5050:80"
    depends_on:
      mysql:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6390:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_minio_password}
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb local/$${MINIO_BUCKET} --ignore-existing;
      mc anonymous set download local/$${MINIO_BUCKET}/thumbnails;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_minio_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-videos}

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "4001:3001"
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-socialapp}:${MYSQL_PASSWORD:-change_me_strong_password}@mysql:3306/${MYSQL_DATABASE:-socialapp}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-change_me_jwt_secret_min_32_chars_long}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_minio_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-videos}
      MINIO_USE_SSL: "false"
      GIPHY_API_KEY: ${GIPHY_API_KEY:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change_me_admin_password}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      VIDEO_STORAGE_LIMIT_GB: ${VIDEO_STORAGE_LIMIT_GB:-150}
      PLATFORM_STORAGE_LIMIT_GB: ${PLATFORM_STORAGE_LIMIT_GB:-180}
      MAX_VIDEOS_PER_USER: ${MAX_VIDEOS_PER_USER:-50}
      MAX_VIDEO_DURATION_SEC: ${MAX_VIDEO_DURATION_SEC:-45}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-100}
      NODE_ENV: production
    volumes:
      - api_uploads:/tmp/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      sh -c "
        while ! nc -z mysql 3306; do
          echo 'En attente de la base de données...';
          sleep 2;
        done;
        echo 'Base de données prête, migration Prisma';
        npx prisma migrate deploy &&
        npx prisma db seed &&
        npm run start:prod
      "

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-socialapp}:${MYSQL_PASSWORD:-change_me_strong_password}@mysql:3306/${MYSQL_DATABASE:-socialapp}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_minio_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-videos}
      MINIO_USE_SSL: "false"
      MAX_VIDEO_DURATION_SEC: ${MAX_VIDEO_DURATION_SEC:-45}
    volumes:
      - api_uploads:/tmp/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      sh -c "
        while ! nc -z mysql 3306; do
          echo 'En attente de la base de données...';
          sleep 2;
        done;
        echo 'Base de données prête';
        npm run start
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4001}
    restart: always
    ports:
      - "4000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4001}
      NODE_ENV: production
    depends_on:
      - api

volumes:
  mysql_data:
  redis_data:
  minio_data:
  api_uploads: